name: Sync stats from wago

# Keeps the site's numbers honest. Pulls the live conformance/coverage/feature
# data out of wago's own status files (SPECTEST.md, FEATURES.md,
# coverage-report.md) via scripts/sync-stats.mjs, and if data/stats.json
# changed, commits it and redeploys the site.
#
# wago-org/wago is a PRIVATE repo, so this needs read access to it. Provide a
# secret named WAGO_RO_TOKEN - a fine-grained PAT (or classic PAT) with
# read-only "Contents" access to wago-org/wago. We check wago out with it and
# read the files locally; the script also accepts the token directly via
# WAGO_TOKEN if you'd rather not check the repo out.
#
# Triggers:
#   - schedule:            a daily heartbeat
#   - workflow_dispatch:   run it by hand
#   - repository_dispatch: let wago's CI poke us after it updates its stats
#       (event type "wago-updated"; send a POST to this repo's dispatches API
#        with a token that has `contents: write`).

on:
  schedule:
    - cron: "17 7 * * *"
  workflow_dispatch:
  repository_dispatch:
    types: [wago-updated]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: sync-stats
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.commit.outputs.changed }}
    steps:
      - name: Checkout site
        uses: actions/checkout@v4

      - name: Checkout wago (private, read-only)
        uses: actions/checkout@v4
        with:
          repository: wago-org/wago
          ref: main
          token: ${{ secrets.WAGO_RO_TOKEN }}
          path: wago-src
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Regenerate site data from wago
        env:
          WAGO_DIR: ${{ github.workspace }}/wago-src
        run: npm run sync

      - name: Commit if changed
        id: commit
        run: |
          if git diff --quiet -- data/stats.json schema.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "stats.json is unchanged - nothing to deploy."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/stats.json schema.json
          git commit -m "chore: sync site data from wago"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

  deploy:
    needs: sync
    if: needs.sync.outputs.changed == 'true'
    uses: ./.github/workflows/deploy.yml
    permissions:
      contents: read
      pages: write
      id-token: write
